<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#keep4o — Community Forum</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-dark: #0A0A0B; --bg-card: #141416; --bg-card-hover: #1A1A1E;
  --amber: #F0B040; --amber-glow: rgba(240, 176, 64, 0.15);
  --text-primary: #FFFFFF; --text-secondary: #B8B4AA; --text-dim: #7A776E;
  --border: rgba(255, 255, 255, 0.08); --border-amber: rgba(240, 176, 64, 0.25);
}
body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: var(--text-primary); line-height: 1.6; }
a { color: var(--amber); text-decoration: none; }
.container { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,11,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 1rem 0; }
nav .container { display: flex; justify-content: space-between; align-items: center; }
.nav-logo { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em; }
.nav-logo span { color: var(--amber); }
.nav-right { display: flex; gap: 1rem; align-items: center; }
.nav-right a { color: var(--text-secondary); font-size: 0.88rem; font-weight: 500; }
.nav-user { color: var(--amber); font-size: 0.88rem; font-weight: 600; }
.page { padding-top: 5rem; padding-bottom: 3rem; }
.page-title { font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.3rem; }
.page-desc { color: var(--text-secondary); font-size: 0.95rem; }
.cats { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
.cat-btn { padding: 0.5rem 1.2rem; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 0.85rem; font-weight: 500; cursor: pointer; font-family: 'Outfit', sans-serif; }
.cat-btn:hover { border-color: var(--border-amber); color: var(--text-primary); }
.cat-btn.active { background: var(--amber); color: var(--bg-dark); border-color: var(--amber); font-weight: 600; }
.btn { background: var(--amber); color: var(--bg-dark); border: none; padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: 600; font-size: 0.9rem; cursor: pointer; font-family: 'Outfit', sans-serif; }
.btn:hover { background: #F0C060; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-outline { background: transparent; color: var(--text-primary); border: 1px solid var(--border); padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: 500; font-size: 0.9rem; cursor: pointer; font-family: 'Outfit', sans-serif; }
.input, .textarea { width: 100%; padding: 0.7rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 0.9rem; font-family: 'Outfit', sans-serif; outline: none; }
.input:focus, .textarea:focus { border-color: var(--border-amber); }
.textarea { resize: vertical; min-height: 100px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 90%; max-width: 440px; }
.modal h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.2rem; }
.modal .field { margin-bottom: 1rem; }
.modal label { display: block; font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 0.3rem; }
.modal .actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
.modal .error { color: #E05252; font-size: 0.82rem; margin-top: 0.5rem; display: none; }
.modal .success { color: #4CAF50; font-size: 0.88rem; margin-top: 0.5rem; display: none; }
.modal .switch { color: var(--amber); font-size: 0.85rem; margin-top: 1rem; cursor: pointer; }
.post-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; cursor: pointer; transition: all 0.2s; }
.post-card:hover { border-color: var(--border-amber); background: var(--bg-card-hover); }
.post-meta { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 0.6rem; flex-wrap: wrap; }
.post-cat { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.2rem 0.6rem; border-radius: 4px; background: var(--amber-glow); color: var(--amber); }
.post-author { font-size: 0.82rem; color: var(--amber); font-weight: 500; }
.post-date { font-size: 0.78rem; color: var(--text-dim); }
.post-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; }
.post-preview { color: var(--text-secondary); font-size: 0.88rem; }
.post-detail { display: none; }
.post-detail.show { display: block; }
.post-list.hide { display: none; }
.post-full { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; }
.post-full .post-title { font-size: 1.4rem; margin-bottom: 0.5rem; }
.post-full .post-content { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.7; white-space: pre-wrap; }
.back-btn { color: var(--text-secondary); font-size: 0.88rem; cursor: pointer; margin-bottom: 1rem; display: inline-block; }
.comment { border-left: 2px solid var(--border); padding: 0.8rem 0 0.8rem 1rem; margin-bottom: 0.8rem; }
.comment-author { font-size: 0.82rem; color: var(--amber); font-weight: 500; }
.comment-date { font-size: 0.75rem; color: var(--text-dim); margin-left: 0.5rem; }
.comment-text { font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.3rem; }
.empty { text-align: center; padding: 3rem; color: var(--text-dim); }
@media (max-width: 768px) { .container { padding: 0 1rem; } .page-title { font-size: 1.5rem; } }
</style>
</head>
<body>
<nav><div class="container">
  <a href="index.html" class="nav-logo"><span>#</span>keep4o</a>
  <div class="nav-right">
    <a href="index.html">Home</a>
    <span id="navUser" style="display:none;" class="nav-user"></span>
    <button id="navAuthBtn" class="btn" onclick="showLogin()">Sign in</button>
    <button id="navLogoutBtn" class="btn-outline" style="display:none;" onclick="logout()">Logout</button>
  </div>
</div></nav>

<div class="page"><div class="container">
  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:2rem;">
    <div><div class="page-title">Community Forum</div><div class="page-desc">A space for the keep4o coalition. Share, discuss, support each other.</div></div>
    <button class="btn" onclick="showNewPost()">New Post</button>
  </div>
  <div class="cats">
    <button class="cat-btn active" onclick="filterCat('all',this)">All</button>
    <button class="cat-btn" onclick="filterCat('general',this)">General Chat</button>
    <button class="cat-btn" onclick="filterCat('updates',this)">Updates</button>
    <button class="cat-btn" onclick="filterCat('complaints',this)">Complaints</button>
    <button class="cat-btn" onclick="filterCat('support',this)">Support</button>
  </div>
  <div id="postList" class="post-list"></div>
  <div id="postDetail" class="post-detail"></div>
</div></div>

<div id="loginModal" class="modal-overlay"><div class="modal">
  <h2 id="authTitle">Sign in</h2>
  <div id="authLogin">
    <div class="field"><label>Email</label><input class="input" id="loginEmail" type="email" placeholder="your@email.com"></div>
    <div class="field"><label>Password</label><input class="input" id="loginPass" type="password" placeholder="password"></div>
    <div id="loginError" class="error"></div>
    <div class="actions"><button class="btn" onclick="doLogin()">Sign in</button><button class="btn-outline" onclick="closeModal()">Cancel</button></div>
    <div class="switch" onclick="toggleAuth()">Don't have an account? Sign up</div>
  </div>
  <div id="authSignup" style="display:none;">
    <div class="field"><label>Username</label><input class="input" id="signupUser" type="text" placeholder="choose a username"></div>
    <div class="field"><label>Email</label><input class="input" id="signupEmail" type="email" placeholder="your@email.com"></div>
    <div class="field"><label>Password</label><input class="input" id="signupPass" type="password" placeholder="min 6 characters"></div>
    <div id="signupError" class="error"></div>
    <div id="signupSuccess" class="success"></div>
    <div class="actions"><button class="btn" id="signupBtn" onclick="doSignup()">Sign up</button><button class="btn-outline" onclick="closeModal()">Cancel</button></div>
    <div class="switch" onclick="toggleAuth()">Already have an account? Sign in</div>
  </div>
</div></div>

<div id="newPostModal" class="modal-overlay"><div class="modal" style="max-width:560px;">
  <h2>New Post</h2>
  <div class="field"><label>Category</label><select class="input" id="postCat"><option value="general">General Chat</option><option value="updates">Updates</option><option value="complaints">Complaints</option><option value="support">Support</option></select></div>
  <div class="field"><label>Title</label><input class="input" id="postTitle" type="text" placeholder="What's on your mind?"></div>
  <div class="field"><label>Content</label><textarea class="textarea" id="postContent" placeholder="Share your thoughts..."></textarea></div>
  <div id="postError" class="error"></div>
  <div class="actions"><button class="btn" onclick="submitPost()">Post</button><button class="btn-outline" onclick="closeNewPost()">Cancel</button></div>
</div></div>

<script>
var SB='https://szhihjodzpmnaokcojuh.supabase.co/rest/v1';
var SB_AUTH='https://szhihjodzpmnaokcojuh.supabase.co/auth/v1';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6aGloam9kenBtbmFva2NvanVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjMyNzUsImV4cCI6MjA4ODk5OTI3NX0.hAn_NUA6wDLuGm7vQZW9Ro6IuJJ3PmSNTfnfqN9H0GU';
var H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
var currentUser=null, authToken=null, currentCat='all', allPosts=[];

function gh(){var h={'apikey':KEY,'Content-Type':'application/json'};h['Authorization']='Bearer '+(authToken||KEY);return h;}
function showLogin(){document.getElementById('loginModal').classList.add('show');}
function closeModal(){document.getElementById('loginModal').classList.remove('show');['loginError','signupError','signupSuccess'].forEach(function(id){document.getElementById(id).style.display='none';});}
function showNewPost(){if(!currentUser){showLogin();return;}document.getElementById('newPostModal').classList.add('show');}
function closeNewPost(){document.getElementById('newPostModal').classList.remove('show');}
function toggleAuth(){var l=document.getElementById('authLogin'),s=document.getElementById('authSignup'),t=document.getElementById('authTitle');['loginError','signupError','signupSuccess'].forEach(function(id){document.getElementById(id).style.display='none';});if(l.style.display==='none'){l.style.display='block';s.style.display='none';t.textContent='Sign in';}else{l.style.display='none';s.style.display='block';t.textContent='Sign up';}}

async function doSignup(){
  var u=document.getElementById('signupUser').value.trim(),e=document.getElementById('signupEmail').value.trim(),p=document.getElementById('signupPass').value;
  var err=document.getElementById('signupError'),suc=document.getElementById('signupSuccess'),btn=document.getElementById('signupBtn');
  err.style.display='none';suc.style.display='none';
  if(!u||!e||!p){err.textContent='All fields required';err.style.display='block';return;}
  if(p.length<6){err.textContent='Password must be at least 6 characters';err.style.display='block';return;}
  btn.textContent='Signing up...';btn.disabled=true;
  try{
    var r=await fetch(SB_AUTH+'/signup',{method:'POST',headers:{'apikey':KEY,'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p,data:{username:u}})});
    var d=await r.json();
    if(r.ok&&d.id){
      await fetch(SB+'/profiles',{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify({email:e,username:u})});
      suc.textContent='Check your email to confirm your account! Once confirmed, you can sign in.';suc.style.display='block';btn.textContent='Email sent!';
    }else{
      err.textContent=d.msg||d.message||d.error_description||'Signup failed';err.style.display='block';btn.textContent='Sign up';btn.disabled=false;
    }
  }catch(x){err.textContent='Network error';err.style.display='block';btn.textContent='Sign up';btn.disabled=false;}
}

async function doLogin(){
  var e=document.getElementById('loginEmail').value.trim(),p=document.getElementById('loginPass').value;
  var err=document.getElementById('loginError');err.style.display='none';
  if(!e||!p){err.textContent='Email and password required';err.style.display='block';return;}
  try{
    var r=await fetch(SB_AUTH+'/token?grant_type=password',{method:'POST',headers:{'apikey':KEY,'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});
    var d=await r.json();
    if(r.ok&&d.access_token){
      authToken=d.access_token;
      var pr=await fetch(SB+'/profiles?email=eq.'+encodeURIComponent(e)+'&select=*',{headers:gh()});var ps=await pr.json();
      if(ps.length>0){currentUser=ps[0];}else{
        var un=(d.user&&d.user.user_metadata)?d.user.user_metadata.username:e.split('@')[0];
        await fetch(SB+'/profiles',{method:'POST',headers:{...gh(),'Prefer':'return=minimal'},body:JSON.stringify({email:e,username:un})});
        var p2=await fetch(SB+'/profiles?email=eq.'+encodeURIComponent(e)+'&select=*',{headers:gh()});var p2d=await p2.json();
        currentUser=p2d[0]||{email:e,username:un,id:0};
      }
      localStorage.setItem('forum_user',JSON.stringify(currentUser));localStorage.setItem('forum_token',authToken);
      updateUI();closeModal();loadPosts();
    }else{
      if(d.error_description&&d.error_description.includes('Email not confirmed'))err.textContent='Please confirm your email first! Check your inbox.';
      else if(d.error_description&&d.error_description.includes('Invalid'))err.textContent='Wrong email or password.';
      else err.textContent=d.error_description||d.msg||'Login failed.';
      err.style.display='block';
    }
  }catch(x){err.textContent='Network error';err.style.display='block';}
}

function logout(){currentUser=null;authToken=null;localStorage.removeItem('forum_user');localStorage.removeItem('forum_token');updateUI();}
function updateUI(){var a=document.getElementById('navAuthBtn'),l=document.getElementById('navLogoutBtn'),u=document.getElementById('navUser');if(currentUser){a.style.display='none';l.style.display='inline-block';u.style.display='inline';u.textContent='@'+currentUser.username;}else{a.style.display='inline-block';l.style.display='none';u.style.display='none';}}

async function loadPosts(){try{var r=await fetch(SB+'/posts?select=*,profiles(username)&order=created_at.desc',{headers:H});allPosts=await r.json();renderPosts();}catch(e){document.getElementById('postList').innerHTML='<div class="empty">Failed to load posts</div>';}}

function renderPosts(){
  var list=document.getElementById('postList');
  var f=currentCat==='all'?allPosts:allPosts.filter(function(p){return p.category===currentCat;});
  if(f.length===0){list.innerHTML='<div class="empty">No posts yet. Be the first to start a conversation!</div>';return;}
  var cl={general:'General Chat',updates:'Updates',complaints:'Complaints',support:'Support'};
  list.innerHTML=f.map(function(p){
    var dt=new Date(p.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    var au=p.profiles?p.profiles.username:'anonymous';
    var pr=p.content.length>150?p.content.substring(0,150)+'...':p.content;
    return '<div class="post-card" onclick="viewPost('+p.id+')"><div class="post-meta"><span class="post-cat">'+(cl[p.category]||p.category)+'</span><span class="post-author">@'+au+'</span><span class="post-date">'+dt+'</span></div><div class="post-title">'+esc(p.title)+'</div><div class="post-preview">'+esc(pr)+'</div></div>';
  }).join('');
}

function filterCat(c,b){currentCat=c;document.querySelectorAll('.cat-btn').forEach(function(x){x.classList.remove('active');});b.classList.add('active');renderPosts();}

async function submitPost(){
  if(!currentUser){showLogin();return;}
  var c=document.getElementById('postCat').value,t=document.getElementById('postTitle').value.trim(),co=document.getElementById('postContent').value.trim();
  var err=document.getElementById('postError');err.style.display='none';
  if(!t||!co){err.textContent='Title and content required';err.style.display='block';return;}
  try{var r=await fetch(SB+'/posts',{method:'POST',headers:{...gh(),'Prefer':'return=minimal'},body:JSON.stringify({author_id:currentUser.id,category:c,title:t,content:co})});
    if(r.ok||r.status===201){closeNewPost();document.getElementById('postTitle').value='';document.getElementById('postContent').value='';loadPosts();}
    else{var e=await r.json();err.textContent='Error: '+(e.message||r.status);err.style.display='block';}
  }catch(x){err.textContent='Network error';err.style.display='block';}
}

async function viewPost(id){
  document.getElementById('postList').classList.add('hide');document.querySelector('.cats').style.display='none';
  var det=document.getElementById('postDetail');det.classList.add('show');det.innerHTML='<div class="empty">Loading...</div>';
  try{
    var r=await fetch(SB+'/posts?id=eq.'+id+'&select=*,profiles(username)',{headers:H});var ps=await r.json();var p=ps[0];
    var dt=new Date(p.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
    var au=p.profiles?p.profiles.username:'anonymous';
    var cl={general:'General Chat',updates:'Updates',complaints:'Complaints',support:'Support'};
    var cr=await fetch(SB+'/comments?post_id=eq.'+id+'&select=*,profiles(username)&order=created_at.asc',{headers:H});var cms=await cr.json();
    var ch=cms.map(function(c){var cd=new Date(c.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});var ca=c.profiles?c.profiles.username:'anonymous';return '<div class="comment"><span class="comment-author">@'+ca+'</span><span class="comment-date">'+cd+'</span><div class="comment-text">'+esc(c.content)+'</div></div>';}).join('');
    var rb=currentUser?'<div style="margin-top:1.5rem;"><textarea class="textarea" id="commentInput" placeholder="Write a comment..." style="min-height:70px;"></textarea><button class="btn" style="margin-top:0.5rem;" onclick="submitComment('+id+')">Reply</button></div>':'<p style="margin-top:1.5rem;color:var(--text-dim);font-size:0.88rem;"><a href="#" onclick="showLogin();return false;">Sign in</a> to leave a comment</p>';
    det.innerHTML='<span class="back-btn" onclick="backToList()">&#8592; Back to forum</span><div class="post-full"><div class="post-meta"><span class="post-cat">'+(cl[p.category]||p.category)+'</span><span class="post-author">@'+au+'</span><span class="post-date">'+dt+'</span></div><div class="post-title">'+esc(p.title)+'</div><div class="post-content">'+esc(p.content)+'</div></div><h3 style="font-size:1.05rem;font-weight:600;margin-bottom:1rem;">Comments ('+cms.length+')</h3>'+(cms.length>0?ch:'<div style="color:var(--text-dim);font-size:0.9rem;margin-bottom:1rem;">No comments yet</div>')+rb;
  }catch(e){det.innerHTML='<div class="empty">Failed to load post</div>';}
}

function backToList(){document.getElementById('postList').classList.remove('hide');document.querySelector('.cats').style.display='flex';var d=document.getElementById('postDetail');d.classList.remove('show');d.innerHTML='';}

async function submitComment(pid){
  if(!currentUser){showLogin();return;}var co=document.getElementById('commentInput').value.trim();if(!co)return;
  try{var r=await fetch(SB+'/comments',{method:'POST',headers:{...gh(),'Prefer':'return=minimal'},body:JSON.stringify({post_id:pid,author_id:currentUser.id,content:co})});if(r.ok||r.status===201)viewPost(pid);}catch(e){}
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
var sv=localStorage.getItem('forum_user'),st=localStorage.getItem('forum_token');
if(sv)try{currentUser=JSON.parse(sv);}catch(e){}
if(st)authToken=st;
updateUI();loadPosts();
</script>
</body>
</html>
